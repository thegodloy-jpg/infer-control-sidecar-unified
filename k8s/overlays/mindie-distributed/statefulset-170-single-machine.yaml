# =============================================================================
# MindIE 分布式 - 170 单机双 NPU 验证 (Pod 网络模式)
#
# 场景说明:
#   在 170（7.6.52.170）单机上使用两张 910B2C NPU（davinci0 和 davinci1）验证
#   MindIE 基于 HCCL 的分布式推理逻辑。
#   MindIE 不使用 Ray，通过 MASTER_ADDR/RANK/WORLD_SIZE + config.json 配置驱动。
#
# 与 NV vLLM-Ray 的核心差异:
#   1. 无 Ray 集群: MindIE 使用 PyTorch Distributed (HCCL) 直接通信
#   2. 两个 Pod 都运行 mindieservice_daemon, 通过 RANK + MASTER_ADDR 协调
#   3. config.json: worldSize=2, npuDeviceIds 按 Pod 分配
#   4. 启动方式: daemon &; wait (非 exec，daemon fork 后需前台等待)
#
# 关键设计:
#   1. Pod 网络: 不使用 hostNetwork, flannel CNI 分配独立 IP
#   2. hostPath IP 交换: /tmp/wings-ip-exchange
#   3. NODE_RANK 从 StatefulSet Pod 名称序号派生
#   4. ASCEND_VISIBLE_DEVICES 按序号隔离 NPU
#   5. npu-smi: 从宿主机挂载 (MindIE topo 检测需要)
#   6. CANN 环境脚本: 挂载 driver + 镜像内置 CANN toolkit
#
# 使用前:
#   1. kubectl get nodes 确认 .170 节点名（默认 "root"）
#   2. 确认 mindie 镜像已导入 k3s containerd
#   3. 确认模型可访问: /mnt/cephfs/models/DeepSeek-R1-Distill-Qwen-1.5B
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: wings-infer
---
apiVersion: v1
kind: Service
metadata:
  name: infer-hl
  namespace: wings-infer
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: infer-mindie
  ports:
    - name: hccl
      port: 27070
    - name: engine
      port: 17000
    - name: proxy
      port: 18000
    - name: health
      port: 19000

---
apiVersion: v1
kind: Service
metadata:
  name: infer-api
  namespace: wings-infer
spec:
  selector:
    app.kubernetes.io/name: infer-mindie
    statefulset.kubernetes.io/pod-name: infer-0
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-mindie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-mindie
    spec:
      # 两个 Pod 调度到 .170
      nodeSelector:
        kubernetes.io/hostname: "root"          # .170 hostname, 如不同请修改
      dnsPolicy: Default

      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        - name: ip-exchange
          hostPath:
            path: /tmp/wings-ip-exchange
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: davinci3
          hostPath:
            path: /dev/davinci3
            type: CharDevice
        - name: davinci4
          hostPath:
            path: /dev/davinci4
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: devmm-svm
          hostPath:
            path: /dev/devmm_svm
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver
            type: Directory
        - name: ascend-driver-lib
          hostPath:
            path: /usr/local/Ascend/driver/lib64
            type: Directory
        - name: hccn-conf
          hostPath:
            path: /etc/hccn.conf
            type: File
        - name: npu-smi
          hostPath:
            path: /usr/local/sbin/npu-smi
            type: File

      containers:
        # ---- Sidecar: wings-infer ----
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st-unified      # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              export NODE_RANK=${POD_NAME##*-}
              rm -f /ip-exchange/pod-${NODE_RANK}-ip
              echo $POD_IP > /ip-exchange/pod-${NODE_RANK}-ip
              if [ "$NODE_RANK" = "0" ]; then
                export MASTER_IP=$POD_IP
                export HEAD_NODE_ADDR=$POD_IP
                for i in $(seq 1 60); do [ -f /ip-exchange/pod-1-ip ] && break; sleep 2; done
                WORKER_IP=$(cat /ip-exchange/pod-1-ip 2>/dev/null || echo "unknown")
                export NODE_IPS="${POD_IP},${WORKER_IP}"
              else
                for i in $(seq 1 60); do [ -f /ip-exchange/pod-0-ip ] && break; sleep 2; done
                export MASTER_IP=$(cat /ip-exchange/pod-0-ip 2>/dev/null || echo "unknown")
                export HEAD_NODE_ADDR=$MASTER_IP
                export NODE_IPS="${MASTER_IP},${POD_IP}"
              fi
              echo "[wings] POD_NAME=$POD_NAME NODE_RANK=$NODE_RANK"
              echo "[wings] POD_IP=$POD_IP MASTER_IP=$MASTER_IP HEAD_NODE_ADDR=$HEAD_NODE_ADDR"
              echo "[wings] NODE_IPS=$NODE_IPS"
              exec python -m app.main
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RANK_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"
            - name: DISTRIBUTED
              value: "true"
            - name: ENGINE
              value: "mindie"
            - name: NNODES
              value: "2"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
            - name: BACKEND_URL
              value: "http://127.0.0.1:17000"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: ip-exchange
              mountPath: /ip-exchange
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

        # ---- Engine: MindIE ----
        - name: engine
          image: mindie:2.2.RC1                              # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              ORDINAL=${POD_NAME##*-}
              # NPU 3 和 4 空闲, 映射: ordinal 0 → NPU 3, ordinal 1 → NPU 4
              NPU_ID=$((ORDINAL + 3))
              export ASCEND_VISIBLE_DEVICES=$NPU_ID
              echo "[engine] POD_NAME=$POD_NAME ordinal=$ORDINAL NPU=$ASCEND_VISIBLE_DEVICES POD_IP=$POD_IP"
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
              echo "[engine] Executing:"
              cat /shared-volume/start_command.sh
              echo "---"
              cd /shared-volume && bash start_command.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ASCEND_VISIBLE_DEVICES
              value: "0"          # 会被启动脚本中的 ORDINAL 覆盖
            - name: PATH
              value: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            # HCCL
            - name: HCCL_WHITELIST_DISABLE
              value: "1"
            - name: HCCL_SOCKET_IFNAME
              value: "eth0"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci3
              mountPath: /dev/davinci3
            - name: davinci4
              mountPath: /dev/davinci4
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: devmm-svm
              mountPath: /dev/devmm_svm
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver
              readOnly: true
            - name: ascend-driver-lib
              mountPath: /usr/local/Ascend/driver/lib64
              readOnly: true
            - name: hccn-conf
              mountPath: /etc/hccn.conf
              readOnly: true
            - name: npu-smi
              mountPath: /usr/local/sbin/npu-smi
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            - name: ip-exchange
              mountPath: /ip-exchange
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
