# =============================================================================
# vLLM-Ascend Ray 分布式 - 170 单机双 NPU 验证 (Pod 网络模式)
# 
# 场景说明:
#   在 170（7.6.52.170）单机上使用两张 910B2C NPU（davinci0 和 davinci1）验证
#   vLLM-Ascend 基于 Ray 的分布式推理逻辑。
#   使用 Pod 网络（CNI），每个 Pod 获得独立 IP，
#   避免 hostNetwork 下两个 Pod 共享宿主 IP 导致角色判断和端口冲突的问题。
#
# 与 NV vLLM-Ray 单机方案(150)的差异:
#   1. 设备: davinci0/davinci1 (NPU) 替代 nvidia0/nvidia1 (GPU)
#   2. 通信库: HCCL 替代 NCCL
#   3. 环境变量: ASCEND_VISIBLE_DEVICES 替代 CUDA_VISIBLE_DEVICES
#   4. CANN 环境: engine 容器需 source set_env.sh
#   5. Ray NPU 资源: --resources='{"NPU":1}' 替代 --num-gpus=1（昇腾 Ray 不自动上报 NPU）
#   6. 无需拷贝驱动库: CANN 已内嵌引擎镜像，只挂载 HAL 驱动
#
# 关键设计:
#   1. Pod 网络: 不使用 hostNetwork，由 flannel CNI 分配独立 Pod IP
#   2. hostPath IP 交换: 通过 /tmp/wings-ip-exchange 让同节点 Pod 交换各自 Pod IP
#   3. NODE_RANK 由 StatefulSet hostname 序号派生（infer-0→0, infer-1→1）
#   4. ASCEND_VISIBLE_DEVICES 同样由序号派生，实现 NPU 隔离
#   5. 去掉 podAntiAffinity，两个 Pod 调度到同一节点
#
# 端口分配（每 Pod 独立 IP，无冲突）:
#   Master (infer-0): 16000(master API) + 17000(vllm) + 18000(proxy) + 19000(health) + 28020(ray head)
#   Worker (infer-1): 16001(worker API) + 19001(health) + Ray worker(动态端口)
#
# 使用前:
#   1. 确认 k3s agent 节点名称: kubectl get nodes 查看 .170 对应节点名
#   2. 替换 nodeName 为实际节点名（默认 "root"）
#   3. 确保镜像已导入 k3s containerd
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: wings-infer
---
apiVersion: v1
kind: Service
metadata:
  name: infer-hl
  namespace: wings-infer
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: infer-vllm-ascend
  ports:
    - name: ray-gcs
      port: 28020
    - name: engine
      port: 17000
    - name: proxy
      port: 18000
    - name: health
      port: 19000

---
apiVersion: v1
kind: Service
metadata:
  name: infer-api
  namespace: wings-infer
spec:
  selector:
    app.kubernetes.io/name: infer-vllm-ascend
    statefulset.kubernetes.io/pod-name: infer-0
  ports:
    - name: proxy
      port: 18000
      targetPort: 18000
    - name: health
      port: 19000
      targetPort: 19000

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infer
  namespace: wings-infer
spec:
  serviceName: infer-hl
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: infer-vllm-ascend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infer-vllm-ascend
    spec:
      # 两个 Pod 必须调度到 .170 的 k3s agent 节点
      nodeSelector:
        kubernetes.io/hostname: "root"          # .170 hostname, 如不同请修改
      # 不设 podAntiAffinity — 同机部署
      # Pod 网络: 不使用 hostNetwork，每个 Pod 由 flannel CNI 分配独立 IP
      dnsPolicy: Default

      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: shared-volume
          emptyDir: {}
        - name: model-volume
          hostPath:
            path: /mnt/cephfs/models
            type: DirectoryOrCreate
        # hostPath IP 交换: 同节点 Pod 通过此目录交换各自的 Pod IP
        - name: ip-exchange
          hostPath:
            path: /tmp/wings-ip-exchange
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        # NPU 设备: 挂载 davinci0 和 davinci1（两张 910B2C）
        - name: davinci0
          hostPath:
            path: /dev/davinci0
            type: CharDevice
        - name: davinci1
          hostPath:
            path: /dev/davinci1
            type: CharDevice
        - name: davinci-manager
          hostPath:
            path: /dev/davinci_manager
            type: CharDevice
        - name: hisi-hdc
          hostPath:
            path: /dev/hisi_hdc
        - name: devmm-svm
          hostPath:
            path: /dev/devmm_svm
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver/lib64/driver
            type: DirectoryOrCreate

      containers:
        # ---- Sidecar: wings-infer ----
        - name: wings-infer
          image: wings-infer:zhanghui-ascend-st-unified     # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 从 POD_NAME 派生 NODE_RANK
              export NODE_RANK=${POD_NAME##*-}
              # == hostPath IP 交换: 绕过可能不可用的 CoreDNS ==
              rm -f /ip-exchange/pod-${NODE_RANK}-ip
              echo $POD_IP > /ip-exchange/pod-${NODE_RANK}-ip
              if [ "$NODE_RANK" = "0" ]; then
                export MASTER_IP=$POD_IP
                export HEAD_NODE_ADDR=$POD_IP
                for i in $(seq 1 60); do [ -f /ip-exchange/pod-1-ip ] && break; sleep 2; done
                WORKER_IP=$(cat /ip-exchange/pod-1-ip 2>/dev/null || echo "unknown")
                export NODE_IPS="${POD_IP},${WORKER_IP}"
              else
                for i in $(seq 1 60); do [ -f /ip-exchange/pod-0-ip ] && break; sleep 2; done
                export MASTER_IP=$(cat /ip-exchange/pod-0-ip 2>/dev/null || echo "unknown")
                export HEAD_NODE_ADDR=$MASTER_IP
                export NODE_IPS="${MASTER_IP},${POD_IP}"
              fi
              echo "[wings] POD_NAME=$POD_NAME NODE_RANK=$NODE_RANK"
              echo "[wings] POD_IP=$POD_IP MASTER_IP=$MASTER_IP HEAD_NODE_ADDR=$HEAD_NODE_ADDR"
              echo "[wings] NODE_IPS=$NODE_IPS"
              exec python -m app.main
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RANK_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: WINGS_DEVICE
              value: "ascend"
            - name: DEVICE
              value: "ascend"
            - name: DEVICE_COUNT
              value: "1"
            - name: DISTRIBUTED
              value: "true"
            - name: ENGINE
              value: "vllm_ascend"
            - name: DISTRIBUTED_EXECUTOR_BACKEND
              value: "ray"
            - name: TENSOR_PARALLEL_SIZE
              value: "1"
            - name: NNODES
              value: "2"
            - name: MODEL_NAME
              value: "DeepSeek-R1-Distill-Qwen-1.5B"
            - name: MODEL_PATH
              value: "/models/DeepSeek-R1-Distill-Qwen-1.5B"
            - name: ENGINE_PORT
              value: "17000"
            - name: PORT
              value: "18000"
            - name: HEALTH_PORT
              value: "19000"
            - name: WINGS_SKIP_PID_CHECK
              value: "true"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: ip-exchange
              mountPath: /ip-exchange
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

        # ---- Engine: vllm-ascend ----
        - name: engine
          image: quay.io/ascend/vllm-ascend:v0.14.0rc1       # CUSTOMIZE
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              ORDINAL=${POD_NAME##*-}
              export ASCEND_VISIBLE_DEVICES=$ORDINAL
              echo "[engine] POD_NAME=$POD_NAME ordinal=$ORDINAL NPU=$ASCEND_VISIBLE_DEVICES POD_IP=$POD_IP"
              echo "[engine] Waiting for start_command.sh..."
              while [ ! -f /shared-volume/start_command.sh ]; do sleep 2; done
              echo "[engine] Executing:"
              cat /shared-volume/start_command.sh
              echo "---"
              cd /shared-volume && bash start_command.sh
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # HCCL 环境变量 (Pod 网络模式)
            - name: HCCL_WHITELIST_DISABLE
              value: "1"
            - name: HCCL_SOCKET_IFNAME
              value: "eth0"
          volumeMounts:
            - name: shared-volume
              mountPath: /shared-volume
            - name: model-volume
              mountPath: /models
              readOnly: true
            - name: davinci0
              mountPath: /dev/davinci0
            - name: davinci1
              mountPath: /dev/davinci1
            - name: davinci-manager
              mountPath: /dev/davinci_manager
            - name: hisi-hdc
              mountPath: /dev/hisi_hdc
            - name: devmm-svm
              mountPath: /dev/devmm_svm
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver/lib64/driver
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
            - name: ip-exchange
              mountPath: /ip-exchange
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "48Gi"
